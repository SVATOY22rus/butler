{% extends 'base.html' %}
{% block title %}Редактирование — Белый список — Дворецкий{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Редактирование записи</h1>
    <p>Белый список — исправьте IP-адрес, владельца или комментарий.</p>
</div>

<div class="card">
    <form method="post" class="data-form">
        <label>
            IP-адрес
            <input type="text" name="ip_address" value="{{ entry.ip_address }}" required>
        </label>

        <label>
            Владелец
            <input type="text" name="owner_name" value="{{ entry.owner_name or '' }}">
        </label>

        <label>
            Комментарий
            <textarea name="comment" rows="4">{{ entry.comment or '' }}</textarea>
        </label>

        <div class="form-actions">
            <button type="submit">Сохранить</button>
            <a class="secondary-button" href="{{ url_for('main.whitelist') }}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
